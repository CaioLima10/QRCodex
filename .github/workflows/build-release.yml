name: Build & Release (Electron)

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            builder_args: --win
            artifact_name: qrcodeapp-windows
          - os: macos-latest
            builder_args: --mac
            artifact_name: qrcodeapp-macos
          - os: ubuntu-latest
            builder_args: --linux
            artifact_name: qrcodeapp-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (npm install)
        run: npm install

      - name: Build with electron-builder (--publish never)
        run: npx electron-builder ${{ matrix.builder_args }} --publish never

      - name: Show dist contents (debug - Windows)
        if: ${{ always() && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          Write-Host "pwd=$PWD"
          Write-Host "dist tree:"
          if (Test-Path "dist") {
            Get-ChildItem "dist" -Recurse | Select-Object FullName, Length
          } else {
            Write-Host "dist/ not found"
          }

      - name: Show dist contents (debug - macOS/Linux)
        if: ${{ always() && runner.os != 'Windows' }}
        shell: bash
        run: |
          echo "pwd=$(pwd)"
          echo "dist tree:"
          ls -la dist || true
          (command -v find >/dev/null 2>&1 && find dist -maxdepth 3 -type f -print) || true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Show downloaded artifacts (debug)
        run: |
          echo "Artifacts tree:"
          ls -la ./artifacts
          find ./artifacts -maxdepth 3 -type f -print

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: QRCodeApp build #${{ github.run_number }}
          generate_release_notes: true
          make_latest: true
          files: ./artifacts/**/*
          fail_on_unmatched_files: true
