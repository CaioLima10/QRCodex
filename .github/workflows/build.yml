# Gera automaticamente as versões Windows, macOS e Linux do QRCodeApp.
# Roda ao dar push na main, ao publicar uma release ou ao clicar em "Run workflow".
name: Build (Windows / macOS / Linux)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qrcodeapp-win
          path: |
            dist/*.exe
            dist/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npm run mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qrcodeapp-mac
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Linux
        run: npm run linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qrcodeapp-linux
          path: |
            dist/*.AppImage
            dist/*.deb
