name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: GitHub Actions Validation
        run: npm run github-actions-test
      - name: Validate build
        run: npm run validate
      - name: Validate platform
        run: npm run validate-platform
      - name: Build Windows
        run: npm run win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: holiver-qrcode-win-release
          path: |
            dist/*-nsis.exe
            dist/*-portable.exe
            dist/*-zip.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Validate build
        run: npm run validate
      - name: Validate platform
        run: npm run validate-platform
      - name: Build Linux
        run: npm run linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: holiver-qrcode-linux-release
          path: |
            dist/*.AppImage
            dist/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Validate build
        run: npm run validate
      - name: Validate platform
        run: npm run validate-platform
      - name: Build macOS
        run: npm run mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: holiver-qrcode-mac-release
          path: dist/*.dmg
