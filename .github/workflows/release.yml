name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    if: ${{ github.event_name != 'release' || github.actor != 'github-actions[bot]' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install NSIS
        run: |
          choco install nsis
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: GitHub Actions Validation
        run: npm run github-actions-test
      - name: Validate build
        run: npm run validate
      - name: Validate platform
        run: npm run validate-platform
      - name: Build Windows
        run: npm run win
      - name: Build NSIS Installer
        run: npm run build-nsis
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: holiver-qrcode-win-release
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
            *.exe
          if-no-files-found: error

  build-linux:
    if: ${{ github.event_name != 'release' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Validate build
        run: npm run validate
      - name: Validate platform
        run: npm run validate-platform
      - name: Build Linux
        run: npm run linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: holiver-qrcode-linux-release
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: error

  build-macos:
    if: ${{ github.event_name != 'release' || github.actor != 'github-actions[bot]' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Validate build
        run: npm run validate
      - name: Validate platform
        run: npm run validate-platform
      - name: Build macOS
        run: npm run mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: holiver-qrcode-mac-release
          path: |
            dist/*.dmg
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: error

  create-release:
    if: ${{ github.event_name != 'release' || github.actor != 'github-actions[bot]' }}
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: holiver-qrcode-*-release
      - name: Remove duplicate debug artifacts
        shell: bash
        run: |
          set -euo pipefail
          find release -name "builder-debug.yml" -delete
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          generate_release_notes: true
          files: release/**/*
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
