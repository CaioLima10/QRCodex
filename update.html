<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualização Disponível - HoliverQRCode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }
        
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 300;
        }
        
        .version-info {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
        }
        
        .current {
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .latest {
            color: #4CAF50;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .btn-update {
            background: #4CAF50;
            color: white;
        }
        
        .btn-update:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .btn-later {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn-later:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .features {
            text-align: left;
            margin: 20px 0;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .features h3 {
            margin: 0 0 10px 0;
            color: #4CAF50;
        }
        
        .features ul {
            margin: 0;
            padding-left: 20px;
        }
        
        .features li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚀</div>
        <h1>Atualização Disponível!</h1>
        
        <div class="version-info">
            <div class="current">Versão atual: <span id="currentVersion"></span></div>
            <div class="latest">Nova versão: <span id="latestVersion"></span></div>
        </div>
        
        <div class="features">
            <h3>🌟 Novidades da v<span id="latestVersion2"></span>:</h3>
            <ul>
                <li>🌍 Multi-idioma com seleção automática</li>
                <li>🔧 Instalador NSIS profissional</li>
                <li>📝 Suporte Unicode completo</li>
                <li>🎨 Interface personalizada</li>
                <li>🔄 Atualização automática</li>
                <li>🚀 CI/CD Enterprise level</li>
            </ul>
        </div>
        
        <div class="buttons">
            <button class="btn-update" onclick="updateNow()">
                🚀 Atualizar Agora
            </button>
            <button class="btn-later" onclick="remindLater()">
                ⏰ Lembrar Depois
            </button>
        </div>
    </div>
    
    <script>
        const { ipcRenderer } = require('electron');
        
        let updateInfo = {};
        
        // Receber informações da atualização
        ipcRenderer.on('update-info', (event, info) => {
            updateInfo = info;
            document.getElementById('currentVersion').textContent = info.currentVersion;
            document.getElementById('latestVersion').textContent = info.version;
            document.getElementById('latestVersion2').textContent = info.version;
        });
        
        function updateNow() {
            if (updateInfo.downloadUrl) {
                ipcRenderer.send('download-update', updateInfo.downloadUrl);
            }
        }
        
        function remindLater() {
            window.close();
        }
        
        // Fechar janela com ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                remindLater();
            }
        });
    </script>
</body>
</html>
